<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Kick Duel Giveaway</title><script src="/socket.io/socket.io.js"></script><style>
:root{--bg:#0b0712;--card:#171124;--line:#33264d;--text:#fff;--muted:#b9aacd;--accent:#a855f7;--good:#22c55e;--bad:#ef4444}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at top,#2a1452,#08060d 60%);color:var(--text);font-family:Inter,Arial,sans-serif}.wrap{max-width:1150px;margin:0 auto;padding:28px}.top{display:flex;justify-content:space-between;gap:16px;align-items:center;margin-bottom:18px}.brand h1{margin:0;font-size:34px}.brand p{margin:6px 0 0;color:var(--muted)}.status{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:14px 18px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:18px}.card{background:rgba(23,17,36,.92);border:1px solid var(--line);border-radius:18px;padding:20px;box-shadow:0 10px 30px rgba(0,0,0,.25)}h2{margin:0 0 14px}.controls{display:flex;gap:10px;flex-wrap:wrap}.pin{padding:13px;border-radius:12px;border:1px solid var(--line);background:#0f0b18;color:#fff}button{border:0;border-radius:12px;padding:13px 17px;background:var(--accent);color:#fff;font-weight:800;cursor:pointer}button.secondary{background:#2a203b}button.danger{background:#dc2626}.pool{display:flex;flex-wrap:wrap;gap:8px;max-height:260px;overflow:auto}.tag{background:#251a37;border:1px solid #473363;padding:8px 11px;border-radius:999px}.big{font-size:56px;font-weight:900}.duel{display:grid;grid-template-columns:1fr 1fr;gap:14px}.fighter{background:#100b19;border:1px solid var(--line);border-radius:16px;padding:16px}.name{font-size:25px;font-weight:900;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.bar{height:24px;background:#241833;border-radius:999px;overflow:hidden;margin-top:12px;border:1px solid #3c2d55}.fill{height:100%;background:linear-gradient(90deg,#ef4444,#f59e0b,#22c55e);transition:width .35s}.log{margin-top:12px;color:var(--muted);line-height:1.5}.winner{font-size:34px;color:#facc15;font-weight:900;text-align:center;margin-top:15px}.err{color:#fb7185;margin-top:10px}.history li{margin:8px 0;color:var(--muted)}@media(max-width:850px){.grid,.duel{grid-template-columns:1fr}.top{display:block}}
</style></head><body><div class="wrap"><div class="top"><div class="brand"><h1>⚔️ Kick Duel Giveaway</h1><p>Chat enters with <b id="cmd">!duel</b>. Roll two fighters and let them battle.</p></div><div class="status"><div id="conn">Connecting...</div><div id="chan"></div><div id="err" class="err"></div></div></div><div class="grid"><div class="card"><h2>Controls</h2><div class="controls"><input id="pin" class="pin" placeholder="Admin PIN" type="password"><button onclick="roll()">Roll 2 Fighters</button><button class="secondary" onclick="lock()">Lock</button><button class="secondary" onclick="unlock()">Unlock</button><button class="secondary" onclick="clearDuel()">Clear Duel</button><button class="danger" onclick="resetPool()">Reset Pool</button></div><div style="margin-top:14px" class="controls"><input id="testName" class="pin" placeholder="Test username"><button class="secondary" onclick="testEntry()">Add Test Entry</button></div><div id="actionErr" class="err"></div></div><div class="card"><h2>Pool</h2><div class="big" id="count">0</div><p id="locked"></p><div id="pool" class="pool"></div></div><div class="card" style="grid-column:1/-1"><h2>Current Duel</h2><div id="duelBox">No duel yet.</div></div><div class="card" style="grid-column:1/-1"><h2>Recent Winners</h2><ul id="history" class="history"></ul></div></div></div><script>
const socket=io();let state=null;const pin=()=>document.getElementById('pin').value||'';socket.on('state',s=>{state=s;render();});function pct(v,max){return Math.max(0,Math.min(100,Math.round(v/max*100)))}function render(){if(!state)return;cmd.textContent=state.command;conn.textContent=(state.connected?'🟢 Connected':'🔴 Disconnected')+' @'+(state.channel||'not-set');chan.textContent='Pool: '+state.poolCount+' entries';err.textContent=state.lastError||'';count.textContent=state.poolCount;locked.textContent=state.locked?'🔒 Entries locked':'🔓 Entries open';pool.innerHTML=state.pool.map(u=>`<span class="tag">${esc(u)}</span>`).join('');history.innerHTML=(state.history||[]).map(h=>`<li><b>${esc(h.winner)}</b> defeated ${esc(h.loser)}</li>`).join('');const d=state.currentDuel;if(!d){duelBox.textContent='No duel yet.';return;}duelBox.innerHTML=`<div class="duel"><div class="fighter"><div class="name">${esc(d.fighter1)}</div><div class="bar"><div class="fill" style="width:${pct(d.hp1,d.maxHp)}%"></div></div><div>${d.hp1}/${d.maxHp} HP</div></div><div class="fighter"><div class="name">${esc(d.fighter2)}</div><div class="bar"><div class="fill" style="width:${pct(d.hp2,d.maxHp)}%"></div></div><div>${d.hp2}/${d.maxHp} HP</div></div></div>${d.winner?`<div class="winner">🏆 ${esc(d.winner)} wins!</div>`:''}<div class="log">${(d.log||[]).map(esc).join('<br>')}</div>`}
function esc(x){return String(x||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}async function api(path,body={}){actionErr.textContent='';const r=await fetch(path,{method:'POST',headers:{'Content-Type':'application/json','x-admin-pin':pin()},body:JSON.stringify(body)});const d=await r.json().catch(()=>({}));if(!r.ok) actionErr.textContent=d.error||'Request failed';return d}function roll(){api('/api/roll')}function lock(){api('/api/lock')}function unlock(){api('/api/unlock')}function resetPool(){if(confirm('Reset giveaway pool?'))api('/api/reset')}function clearDuel(){api('/api/clear-duel')}function testEntry(){api('/api/test-entry',{username:testName.value||'TestUser'})}
</script></body></html>
