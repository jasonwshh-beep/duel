<!doctype html>
<html>
<head>
<meta charset="utf-8">
<script src="/socket.io/socket.io.js"></script>
<style>
:root{--purple:#a855f7;--dark:#11001f;--red:#ef4444;--gold:#facc15;}
*{box-sizing:border-box}html,body{width:100%;height:100%;margin:0;overflow:hidden;font-family:Arial,Helvetica,sans-serif;color:#fff;background:radial-gradient(circle at center,#4c1d95 0%,#240046 48%,#090018 100%)}
.arena{position:relative;width:100vw;height:100vh;background:linear-gradient(180deg,rgba(10,0,25,.1),rgba(0,0,0,.65)),radial-gradient(circle at 50% 42%,rgba(168,85,247,.35),transparent 35%);border:10px solid rgba(168,85,247,.35);box-shadow:inset 0 0 80px rgba(0,0,0,.85),inset 0 0 70px rgba(168,85,247,.4)}
.castle{position:absolute;inset:0;opacity:.24;background:linear-gradient(transparent 52%,rgba(0,0,0,.75) 52%),repeating-linear-gradient(90deg,transparent 0 70px,rgba(255,255,255,.08) 71px 76px,transparent 77px 150px);clip-path:polygon(0 35%,7% 35%,7% 26%,12% 26%,12% 35%,20% 35%,20% 18%,27% 18%,27% 35%,37% 35%,37% 24%,44% 24%,44% 35%,56% 35%,56% 24%,63% 24%,63% 35%,73% 35%,73% 18%,80% 18%,80% 35%,88% 35%,88% 26%,93% 26%,93% 35%,100% 35%,100% 100%,0 100%)}
.header{position:absolute;top:24px;left:0;right:0;text-align:center;z-index:3}.title{font-size:56px;font-weight:1000;letter-spacing:2px;text-shadow:0 0 18px var(--purple),0 5px 0 #000}.subtitle{font-size:22px;font-weight:900}.subtitle b{color:#c084fc}.timer{margin:10px auto 0;width:230px;padding:10px 22px;border:2px solid rgba(216,180,254,.7);border-radius:18px;background:rgba(0,0,0,.5);font-size:38px;font-weight:1000;color:#d8b4fe;box-shadow:0 0 25px rgba(168,85,247,.35)}
.center{position:absolute;left:50%;top:47%;transform:translate(-50%,-50%);font-size:80px;font-weight:1000;color:#e9d5ff;text-shadow:0 0 25px #a855f7;z-index:5}.status{position:absolute;left:50%;top:63%;transform:translateX(-50%);min-width:360px;text-align:center;padding:16px 24px;background:rgba(0,0,0,.62);border:2px solid rgba(168,85,247,.7);border-radius:22px;font-size:28px;font-weight:1000;z-index:6}.winner{color:var(--gold);text-shadow:0 0 18px #000,0 0 16px #f59e0b}.pool{position:absolute;left:50%;bottom:30px;transform:translateX(-50%);padding:16px 30px;background:rgba(0,0,0,.55);border:2px solid rgba(216,180,254,.6);border-radius:20px;font-size:28px;font-weight:1000;z-index:4}.pool b{color:#d8b4fe}
.side{position:absolute;bottom:105px;width:42%;height:70%;z-index:2}.left{left:35px}.right{right:35px}.nameplate{position:absolute;top:23%;width:75%;padding:12px 18px;background:rgba(0,0,0,.65);border:2px solid rgba(216,180,254,.7);border-radius:18px;font-size:30px;font-weight:1000;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.left .nameplate{left:0;color:#d8b4fe}.right .nameplate{right:0;color:#fca5a5}.fighter{position:absolute;bottom:100px;width:270px;height:360px;filter:drop-shadow(0 20px 25px rgba(0,0,0,.8));}.left .fighter{left:18%;animation:leftIdle 1.1s infinite ease-in-out}.right .fighter{right:18%;transform:scaleX(-1);animation:rightIdle 1.1s infinite ease-in-out}.dueling .left .fighter{animation:leftAttack .9s infinite ease-in-out}.dueling .right .fighter{animation:rightAttack .9s infinite ease-in-out}.finished .loser{opacity:.55;filter:grayscale(.6) drop-shadow(0 10px 18px #000);transform:rotate(-8deg)}
.head{position:absolute;left:92px;top:18px;width:88px;height:76px;background:linear-gradient(145deg,#f8fafc,#64748b 60%,#111827);border:4px solid #111;border-radius:48% 48% 36% 36%;box-shadow:inset -10px -10px 15px rgba(0,0,0,.45)}.plume{position:absolute;left:112px;top:-22px;width:75px;height:45px;background:linear-gradient(90deg,#d8b4fe,#7c3aed);border-radius:100% 0 100% 0;transform:rotate(-15deg)}.right .plume{background:linear-gradient(90deg,#fca5a5,#dc2626)}.visor{position:absolute;left:112px;top:50px;width:54px;height:12px;background:#050505;border-radius:10px;box-shadow:0 0 8px #000}.body{position:absolute;left:70px;top:92px;width:130px;height:145px;background:linear-gradient(135deg,#e5e7eb,#374151 55%,#0f172a);border:4px solid #111;border-radius:30px 30px 22px 22px;box-shadow:inset -18px -18px 24px rgba(0,0,0,.55)}.crest{position:absolute;left:108px;top:130px;font-size:42px;color:#d8b4fe;text-shadow:0 2px 5px #000}.right .crest{color:#f87171}.cape{position:absolute;left:10px;top:90px;width:120px;height:230px;background:linear-gradient(140deg,#7c3aed,#2e1065);clip-path:polygon(45% 0,100% 15%,75% 100%,0 85%);opacity:.9;z-index:-1}.right .cape{background:linear-gradient(140deg,#dc2626,#450a0a)}.arm{position:absolute;width:38px;height:115px;background:linear-gradient(#cbd5e1,#334155);border:3px solid #111;border-radius:20px;top:120px}.arm.front{left:178px;transform:rotate(-42deg);transform-origin:top}.arm.back{left:54px;transform:rotate(35deg);transform-origin:top}.leg{position:absolute;width:45px;height:110px;background:linear-gradient(#94a3b8,#1e293b);border:3px solid #111;border-radius:18px;top:225px}.leg.one{left:82px;transform:rotate(8deg)}.leg.two{left:148px;transform:rotate(-8deg)}.sword{position:absolute;left:207px;top:102px;width:14px;height:230px;background:linear-gradient(90deg,#94a3b8,#fff,#64748b);border:2px solid #111;transform:rotate(-50deg);transform-origin:bottom;border-radius:10px;box-shadow:0 0 12px rgba(255,255,255,.45)}.sword:before{content:"";position:absolute;left:-21px;bottom:16px;width:56px;height:12px;background:#8b5cf6;border:2px solid #111;border-radius:8px}.right .sword:before{background:#ef4444}.shield{position:absolute;left:18px;top:150px;width:65px;height:82px;background:linear-gradient(135deg,#a855f7,#2e1065);border:4px solid #111;border-radius:50% 50% 45% 45%;box-shadow:inset -10px -10px 14px rgba(0,0,0,.4)}.right .shield{background:linear-gradient(135deg,#ef4444,#450a0a)}
.hpwrap{position:absolute;left:0;right:0;bottom:10px;background:rgba(0,0,0,.68);border:2px solid rgba(255,255,255,.2);border-radius:18px;padding:14px 16px}.hptext{display:flex;justify-content:space-between;font-size:22px;font-weight:1000;margin-bottom:8px}.bar{height:32px;background:#180a29;border-radius:999px;overflow:hidden;border:2px solid rgba(255,255,255,.25)}.fill{height:100%;width:100%;transition:width .45s linear;border-radius:999px}.leftFill{background:linear-gradient(90deg,#581c87,#a855f7,#e9d5ff);box-shadow:0 0 18px #a855f7}.rightFill{background:linear-gradient(90deg,#7f1d1d,#ef4444,#fecaca);box-shadow:0 0 18px #ef4444}.spark{position:absolute;left:50%;top:47%;width:80px;height:80px;transform:translate(-50%,-50%);background:radial-gradient(circle,#fff 0 8%,#facc15 9% 18%,transparent 45%);opacity:0;z-index:7}.dueling .spark{animation:spark 1s infinite}.hidden{display:none}
@keyframes leftIdle{50%{transform:translateY(-5px)}}@keyframes rightIdle{50%{transform:scaleX(-1) translateY(-5px)}}@keyframes leftAttack{0%,100%{transform:translateX(0)}50%{transform:translateX(42px)}}@keyframes rightAttack{0%,100%{transform:scaleX(-1) translateX(0)}50%{transform:scaleX(-1) translateX(42px)}}@keyframes spark{0%,60%,100%{opacity:0;transform:translate(-50%,-50%) scale(.4)}50%{opacity:1;transform:translate(-50%,-50%) scale(1.25)}}
</style>
</head>
<body>
<div id="arena" class="arena">
  <div class="castle"></div>
  <div class="header"><div class="title">⚔️ DUEL GIVEAWAY ⚔️</div><div class="subtitle">TYPE <b id="cmd">!DUEL</b> TO ENTER</div><div id="timer" class="timer">00:15</div></div>
  <div class="side left"><div id="name1" class="nameplate">PLAYER 1</div><div id="fighter1" class="fighter"><div class="cape"></div><div class="plume"></div><div class="head"></div><div class="visor"></div><div class="body"></div><div class="crest">♛</div><div class="arm back"></div><div class="arm front"></div><div class="sword"></div><div class="shield"></div><div class="leg one"></div><div class="leg two"></div></div><div class="hpwrap"><div class="hptext"><span>HP</span><span id="hp1num">100 / 100</span></div><div class="bar"><div id="hp1" class="fill leftFill"></div></div></div></div>
  <div class="center">VS</div><div class="spark"></div><div id="status" class="status">Waiting for duel...</div>
  <div class="side right"><div id="name2" class="nameplate">PLAYER 2</div><div id="fighter2" class="fighter"><div class="cape"></div><div class="plume"></div><div class="head"></div><div class="visor"></div><div class="body"></div><div class="crest">♛</div><div class="arm back"></div><div class="arm front"></div><div class="sword"></div><div class="shield"></div><div class="leg one"></div><div class="leg two"></div></div><div class="hpwrap"><div class="hptext"><span>HP</span><span id="hp2num">100 / 100</span></div><div class="bar"><div id="hp2" class="fill rightFill"></div></div></div></div>
  <div id="pool" class="pool"><b>0</b> entered</div>
</div>
<script>
const arena=document.getElementById('arena'),cmd=document.getElementById('cmd'),name1=document.getElementById('name1'),name2=document.getElementById('name2'),hp1=document.getElementById('hp1'),hp2=document.getElementById('hp2'),hp1num=document.getElementById('hp1num'),hp2num=document.getElementById('hp2num'),timer=document.getElementById('timer'),statusEl=document.getElementById('status'),pool=document.getElementById('pool'),fighter1=document.getElementById('fighter1'),fighter2=document.getElementById('fighter2');
let lastState=null;
function esc(x){return String(x||'').replace(/[&<>\"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
function pct(v,max){return Math.max(0,Math.min(100,Math.round((Number(v)||0)/(Number(max)||100)*100)))}
function mmss(ms){const s=Math.max(0,Math.ceil(ms/1000));return `00:${String(s).padStart(2,'0')}`}
function render(s){lastState=s;cmd.textContent=(s.command||'!duel').toUpperCase();pool.innerHTML=`<b>${s.poolCount||0}</b> entered`;const d=s.currentDuel;if(!d){arena.classList.remove('dueling','finished');name1.textContent='PLAYER 1';name2.textContent='PLAYER 2';hp1.style.width='100%';hp2.style.width='100%';hp1num.textContent='100 / 100';hp2num.textContent='100 / 100';timer.textContent='00:15';statusEl.textContent='Waiting for roll...';statusEl.classList.remove('winner');fighter1.classList.remove('loser');fighter2.classList.remove('loser');return;}name1.innerHTML='@'+esc(d.fighter1);name2.innerHTML='@'+esc(d.fighter2);const max=d.maxHp||100;hp1.style.width=pct(d.hp1,max)+'%';hp2.style.width=pct(d.hp2,max)+'%';hp1num.textContent=`${d.hp1} / ${max}`;hp2num.textContent=`${d.hp2} / ${max}`;if(d.status==='fighting'){arena.classList.add('dueling');arena.classList.remove('finished');statusEl.textContent=(d.log&&d.log[0])?d.log[0]:'Swords are clashing...';statusEl.classList.remove('winner');fighter1.classList.remove('loser');fighter2.classList.remove('loser');}else{arena.classList.remove('dueling');arena.classList.add('finished');statusEl.innerHTML=`🏆 ${esc(d.winner)} WINS`;statusEl.classList.add('winner');if(d.loser===d.fighter1)fighter1.classList.add('loser');if(d.loser===d.fighter2)fighter2.classList.add('loser');timer.textContent='00:00';}}
function tickTimer(){const d=lastState?.currentDuel;if(!d||d.status!=='fighting'){return}timer.textContent=mmss((d.endsAt||Date.now())-Date.now())}
async function poll(){try{render(await fetch('/api/state?ts='+Date.now(),{cache:'no-store'}).then(r=>r.json()))}catch(e){}}
try{const socket=io({transports:['websocket','polling'],reconnection:true});socket.on('state',render);socket.on('connect',poll)}catch(e){}
setInterval(poll,1000);setInterval(tickTimer,150);poll();
</script>
</body>
</html>
