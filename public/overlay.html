<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<script src="/socket.io/socket.io.js"></script>
<style>
:root{--purple:#a855f7;--purple2:#6d28d9;--red:#ef4444;--red2:#7f1d1d;--gold:#facc15;--ink:#07000f;--panel:rgba(8,4,18,.78);--line:rgba(216,180,254,.55)}
*{box-sizing:border-box} html,body{width:100%;height:100%;margin:0;overflow:hidden;font-family:Impact,Arial Black,Arial,sans-serif;color:#fff;background:#210047}.arena{position:relative;width:100vw;height:100vh;min-width:960px;min-height:540px;background:radial-gradient(circle at 50% 43%,#6d28d9 0,#2e1065 42%,#070011 100%);border:8px solid rgba(168,85,247,.35);box-shadow:inset 0 0 90px #000,inset 0 0 80px rgba(168,85,247,.35)}
.arena:before{content:"";position:absolute;inset:0;opacity:.24;background:linear-gradient(transparent 52%,rgba(0,0,0,.9) 52%),repeating-linear-gradient(90deg,transparent 0 72px,rgba(255,255,255,.08) 75px 82px,transparent 85px 160px);clip-path:polygon(0 38%,7% 38%,7% 28%,12% 28%,12% 38%,20% 38%,20% 19%,27% 19%,27% 38%,37% 38%,37% 27%,44% 27%,44% 38%,56% 38%,56% 27%,63% 27%,63% 38%,73% 38%,73% 19%,80% 19%,80% 38%,88% 38%,88% 28%,93% 28%,93% 38%,100% 38%,100% 100%,0 100%)}
.header{position:absolute;top:12px;left:28px;right:28px;height:126px;z-index:10;text-align:center;pointer-events:none}.title{font-size:clamp(34px,5vw,72px);line-height:.9;letter-spacing:2px;text-shadow:0 0 18px var(--purple),0 6px 0 #000}.sub{font-family:Arial,sans-serif;font-size:clamp(16px,1.6vw,24px);font-weight:900;margin-top:8px}.sub b{color:#d8b4fe}.timer{position:absolute;left:50%;top:94px;transform:translateX(-50%);width:210px;padding:9px 14px;background:rgba(0,0,0,.7);border:2px solid var(--line);border-radius:18px;font-size:clamp(28px,3.2vw,46px);color:#e9d5ff;box-shadow:0 0 28px rgba(168,85,247,.38)}
.topCard{position:absolute;top:24px;width:190px;padding:14px 16px;background:var(--panel);border:2px solid var(--line);border-radius:18px;z-index:11;text-align:center;font-family:Arial,sans-serif;font-weight:900}.entries{left:28px}.prize{right:28px}.topCard .big{font-size:34px;color:#d8b4fe}
.battle{position:absolute;left:34px;right:34px;top:155px;bottom:128px;display:grid;grid-template-columns:minmax(330px,1fr) 230px minmax(330px,1fr);gap:16px;z-index:4}.side{position:relative;min-width:0}.nameplate{position:absolute;top:0;width:92%;height:64px;padding:10px 18px;background:rgba(0,0,0,.72);border:2px solid var(--line);border-radius:16px;text-align:center;font-size:clamp(22px,2vw,34px);font-weight:1000;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;z-index:20}.leftSide .nameplate{left:0;color:#e9d5ff}.rightSide .nameplate{right:0;color:#fecaca;border-color:rgba(252,165,165,.7)}
.center{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:30}.vs{font-size:clamp(60px,6vw,105px);color:#e9d5ff;text-shadow:0 0 22px var(--purple),0 6px 0 #000}.status{width:100%;min-height:112px;padding:18px;background:rgba(0,0,0,.76);border:2px solid var(--line);border-radius:22px;display:flex;align-items:center;justify-content:center;text-align:center;font-family:Arial,sans-serif;font-weight:1000;font-size:clamp(18px,1.6vw,27px);line-height:1.1;box-shadow:0 0 25px rgba(0,0,0,.6)}.winner{color:var(--gold);text-shadow:0 0 18px #000,0 0 18px #f59e0b}.spark{position:absolute;left:50%;top:50%;width:110px;height:110px;transform:translate(-50%,-50%);opacity:0;pointer-events:none;z-index:40;background:radial-gradient(circle,#fff 0 7%,#facc15 8% 18%,#f97316 19% 25%,transparent 55%);clip-path:polygon(50% 0,57% 38%,100% 18%,63% 50%,100% 82%,57% 62%,50% 100%,43% 62%,0 82%,37% 50%,0 18%,43% 38%)}.dueling .spark{animation:sparkPulse .75s infinite ease-out}.screenShake.dueling{animation:shake .75s infinite}
.fighter{position:absolute;top:72px;bottom:92px;width:320px;max-width:58%;min-width:245px;z-index:8;filter:drop-shadow(0 22px 18px rgba(0,0,0,.85))}.leftSide .fighter{left:58%;transform:translateX(-50%)}.rightSide .fighter{right:58%;transform:translateX(50%) scaleX(-1)}.dueling .leftSide .fighter{animation:leftBody .75s infinite cubic-bezier(.2,.9,.2,1)}.dueling .rightSide .fighter{animation:rightBody .75s infinite cubic-bezier(.2,.9,.2,1)}.finished .loser{opacity:.52;filter:grayscale(.8) drop-shadow(0 14px 18px #000);transform:translateX(-50%) rotate(-12deg) translateY(22px)}.finished .rightSide .loser{transform:translateX(50%) scaleX(-1) rotate(-12deg) translateY(22px)}.finished .winnerKnight{filter:drop-shadow(0 22px 18px rgba(0,0,0,.85)) drop-shadow(0 0 24px var(--gold))}
.knight{position:absolute;inset:0}.cape{position:absolute;left:0;top:22%;width:52%;height:62%;background:linear-gradient(135deg,#7c3aed,#2e1065 65%,rgba(0,0,0,.7));clip-path:polygon(52% 0,100% 12%,70% 100%,0 92%,17% 27%);filter:drop-shadow(0 12px 15px rgba(0,0,0,.55));z-index:1}.rightSide .cape{background:linear-gradient(135deg,#dc2626,#450a0a 65%,rgba(0,0,0,.7))}.head{position:absolute;left:39%;top:2%;width:28%;height:18%;background:linear-gradient(145deg,#f8fafc,#64748b 58%,#0f172a);border:4px solid #09090b;border-radius:45% 45% 36% 36%;z-index:8;box-shadow:inset -10px -10px 14px rgba(0,0,0,.5)}.plume{position:absolute;left:49%;top:-3%;width:28%;height:11%;background:linear-gradient(90deg,#e9d5ff,#7c3aed);border-radius:90% 0 90% 0;transform:rotate(-18deg);z-index:9}.rightSide .plume{background:linear-gradient(90deg,#fecaca,#dc2626)}.visor{position:absolute;left:47%;top:10%;width:18%;height:3%;background:#020617;border-radius:10px;box-shadow:0 0 7px #000;z-index:10}.body{position:absolute;left:33%;top:19%;width:38%;height:43%;background:linear-gradient(145deg,#e2e8f0,#475569 55%,#111827);border:5px solid #070707;border-radius:32% 32% 18% 18%;z-index:5;box-shadow:inset -18px -14px 20px rgba(0,0,0,.45)}.crest{position:absolute;left:45%;top:32%;font-size:40px;color:rgba(168,85,247,.9);z-index:7;text-shadow:0 2px 0 #000}.rightSide .crest{color:rgba(239,68,68,.9)}.leg{position:absolute;top:58%;width:16%;height:32%;background:linear-gradient(#cbd5e1,#334155 60%,#0f172a);border:4px solid #09090b;border-radius:20px;z-index:4}.leg.one{left:36%;transform:rotate(8deg)}.leg.two{left:56%;transform:rotate(-12deg)}.boot{position:absolute;bottom:-5%;width:24%;height:9%;background:#111827;border:3px solid #050505;border-radius:16px;z-index:5}.boot.one{left:29%;transform:rotate(-8deg)}.boot.two{left:55%;transform:rotate(10deg)}
.shieldArm{position:absolute;left:25%;top:34%;width:17%;height:34%;transform:rotate(28deg);transform-origin:top center;z-index:6}.shieldArm:before{content:"";position:absolute;left:35%;top:0;width:35%;height:74%;background:linear-gradient(#cbd5e1,#475569);border:3px solid #09090b;border-radius:20px}.shield{position:absolute;left:-35%;top:28%;width:88%;height:50%;background:linear-gradient(135deg,#a855f7,#2e1065);border:4px solid #09090b;border-radius:50% 50% 45% 45%;box-shadow:inset -10px -9px 12px rgba(0,0,0,.42)}.rightSide .shield{background:linear-gradient(135deg,#ef4444,#450a0a)}
.weaponArm{position:absolute;left:62%;top:30%;width:115px;height:150px;transform-origin:18px 18px;z-index:12;transform:rotate(-42deg)}.upperArm{position:absolute;left:0;top:0;width:30px;height:76px;background:linear-gradient(#e2e8f0,#475569);border:4px solid #09090b;border-radius:18px;transform-origin:50% 12px}.foreArm{position:absolute;left:10px;top:58px;width:28px;height:92px;background:linear-gradient(#f8fafc,#334155);border:4px solid #09090b;border-radius:18px;transform:rotate(-16deg);transform-origin:50% 8px}.hand{position:absolute;left:5px;bottom:-12px;width:26px;height:24px;background:#111827;border:3px solid #050505;border-radius:50%}.sword{position:absolute;left:8px;bottom:4px;width:10px;height:174px;background:linear-gradient(90deg,#94a3b8,#fff,#64748b);border:2px solid #111827;border-radius:8px;transform:rotate(-8deg);transform-origin:50% 95%;box-shadow:0 0 16px rgba(255,255,255,.65)}.sword:before{content:"";position:absolute;left:-28px;bottom:15px;width:66px;height:10px;background:linear-gradient(90deg,#4c1d95,#c084fc,#4c1d95);border:2px solid #111827;border-radius:9px}.rightSide .sword:before{background:linear-gradient(90deg,#7f1d1d,#fca5a5,#7f1d1d)}.sword:after{content:"";position:absolute;left:-5px;top:-15px;width:16px;height:20px;background:#fff;clip-path:polygon(50% 0,100% 100%,0 100%)}
.dueling .leftSide .weaponArm{animation:leftSlash .75s infinite cubic-bezier(.1,.8,.16,1)}.dueling .rightSide .weaponArm{animation:rightSlash .75s infinite cubic-bezier(.1,.8,.16,1)}.dueling .foreArm{animation:foreSnap .75s infinite cubic-bezier(.1,.8,.2,1)}
.hpwrap{position:absolute;left:0;right:0;bottom:0;height:88px;background:rgba(0,0,0,.76);border:2px solid rgba(255,255,255,.2);border-radius:18px;padding:12px 16px;z-index:25}.hptext{display:flex;justify-content:space-between;font-family:Arial,sans-serif;font-size:clamp(18px,1.6vw,25px);font-weight:1000;margin-bottom:8px}.bar{height:clamp(24px,2.4vw,34px);background:#190a28;border:2px solid rgba(255,255,255,.22);border-radius:999px;overflow:hidden}.fill{height:100%;width:100%;border-radius:999px;transition:width .45s linear}.leftFill{background:linear-gradient(90deg,#581c87,#a855f7,#f3e8ff);box-shadow:0 0 18px #a855f7}.rightFill{background:linear-gradient(90deg,#7f1d1d,#ef4444,#fecaca);box-shadow:0 0 18px #ef4444}
.footer{position:absolute;left:34px;right:34px;bottom:24px;height:84px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:18px;z-index:10}.info{display:flex;align-items:center;justify-content:center;text-align:center;padding:10px 18px;background:rgba(0,0,0,.68);border:2px solid rgba(216,180,254,.55);border-radius:20px;font-family:Arial,sans-serif;font-size:clamp(17px,1.5vw,26px);font-weight:1000}.info b{color:#d8b4fe}.hidden{display:none!important}
@keyframes leftBody{0%,100%{transform:translateX(-50%) translateY(0)}35%{transform:translateX(-43%) translateY(-5px) rotate(-1deg)}50%{transform:translateX(-30%) translateY(4px) rotate(3deg)}67%{transform:translateX(-38%) translateY(0)}}
@keyframes rightBody{0%,100%{transform:translateX(50%) scaleX(-1) translateY(0)}35%{transform:translateX(43%) scaleX(-1) translateY(-5px) rotate(-1deg)}50%{transform:translateX(30%) scaleX(-1) translateY(4px) rotate(3deg)}67%{transform:translateX(38%) scaleX(-1) translateY(0)}}
@keyframes leftSlash{0%,100%{transform:rotate(-48deg) translate(0,0)}28%{transform:rotate(-84deg) translate(-2px,-4px)}48%{transform:rotate(16deg) translate(28px,2px)}62%{transform:rotate(-5deg) translate(18px,0)}78%{transform:rotate(-66deg) translate(2px,-2px)}}
@keyframes rightSlash{0%,100%{transform:rotate(-48deg) translate(0,0)}28%{transform:rotate(-84deg) translate(-2px,-4px)}48%{transform:rotate(16deg) translate(28px,2px)}62%{transform:rotate(-5deg) translate(18px,0)}78%{transform:rotate(-66deg) translate(2px,-2px)}}
@keyframes foreSnap{0%,100%{transform:rotate(-18deg)}45%,58%{transform:rotate(8deg)}75%{transform:rotate(-28deg)}}
@keyframes sparkPulse{0%,42%,100%{opacity:0;transform:translate(-50%,-50%) scale(.28) rotate(0)}49%,61%{opacity:1;transform:translate(-50%,-50%) scale(1.15) rotate(22deg)}72%{opacity:.45;transform:translate(-50%,-50%) scale(.65) rotate(45deg)}}
@keyframes shake{0%,42%,100%{filter:none}50%{filter:drop-shadow(0 0 8px #fff)}}
@media(max-width:1050px){.arena{min-width:0}.battle{left:18px;right:18px;grid-template-columns:1fr 160px 1fr}.fighter{min-width:190px}.nameplate{font-size:20px}.center{gap:8px}.status{font-size:17px}.timer{width:160px}.topCard{display:none}.footer{left:18px;right:18px}.weaponArm{transform:scale(.85) rotate(-42deg)}}
</style>
</head>
<body>
<div id="arena" class="arena">
  <div class="topCard entries">ENTRANTS<div id="poolCount" class="big">0</div></div>
  <div class="topCard prize">PRIZE<div class="big">TIP</div></div>
  <div class="header"><div class="title">DUEL GIVEAWAY</div><div class="sub">TYPE <b id="cmd">!DUEL</b> TO ENTER</div><div id="timer" class="timer">00:15</div></div>
  <div class="battle">
    <div class="side leftSide">
      <div id="name1" class="nameplate">PLAYER 1</div>
      <div id="fighter1" class="fighter"><div class="knight"><div class="cape"></div><div class="plume"></div><div class="head"></div><div class="visor"></div><div class="body"></div><div class="crest">♛</div><div class="shieldArm"><div class="shield"></div></div><div class="weaponArm"><div class="upperArm"></div><div class="foreArm"><div class="hand"></div><div class="sword"></div></div></div><div class="leg one"></div><div class="leg two"></div><div class="boot one"></div><div class="boot two"></div></div></div>
      <div class="hpwrap"><div class="hptext"><span>HP</span><span id="hp1num">100 / 100</span></div><div class="bar"><div id="hp1" class="fill leftFill"></div></div></div>
    </div>
    <div class="center"><div class="vs">VS</div><div id="status" class="status">Waiting for duel...</div><div class="spark"></div></div>
    <div class="side rightSide">
      <div id="name2" class="nameplate">PLAYER 2</div>
      <div id="fighter2" class="fighter"><div class="knight"><div class="cape"></div><div class="plume"></div><div class="head"></div><div class="visor"></div><div class="body"></div><div class="crest">♛</div><div class="shieldArm"><div class="shield"></div></div><div class="weaponArm"><div class="upperArm"></div><div class="foreArm"><div class="hand"></div><div class="sword"></div></div></div><div class="leg one"></div><div class="leg two"></div><div class="boot one"></div><div class="boot two"></div></div></div>
      <div class="hpwrap"><div class="hptext"><span>HP</span><span id="hp2num">100 / 100</span></div><div class="bar"><div id="hp2" class="fill rightFill"></div></div></div>
    </div>
  </div>
  <div class="footer"><div class="info">👤 <b id="entriesBottom">0</b>&nbsp; ENTRIES</div><div class="info">⚔️ 2 RANDOM PEOPLE DUEL</div><div class="info">👑 WINNER GETS THE TIP</div></div>
</div>
<script>
const $=id=>document.getElementById(id); let state=null; let duelId=null; let localEnd=0; let pollTimer=null;
function esc(x){return String(x||'').replace(/[&<>\"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','\"':'&quot;'}[c]||c))}
function pct(h,max){return Math.max(0,Math.min(100,Math.round((Number(h)||0)/(Number(max)||100)*100)))}
function render(s){state=s||state;if(!state)return; $('cmd').textContent=(state.command||'!duel').toUpperCase(); $('poolCount').textContent=state.poolCount||0; $('entriesBottom').textContent=state.poolCount||0; const d=state.currentDuel; const arena=$('arena'); arena.classList.remove('dueling','finished','screenShake'); $('fighter1').classList.remove('winnerKnight','loser'); $('fighter2').classList.remove('winnerKnight','loser'); if(!d){duelId=null; $('name1').textContent='PLAYER 1'; $('name2').textContent='PLAYER 2'; setHp(1,100,100); setHp(2,100,100); $('timer').textContent='00:15'; $('status').innerHTML='Waiting for duel...'; return;} if(duelId!==d.id){duelId=d.id; localEnd=Number(d.endsAt)||Date.now()+15000;} $('name1').textContent=d.fighter1||'PLAYER 1'; $('name2').textContent=d.fighter2||'PLAYER 2'; setHp(1,d.hp1,d.maxHp); setHp(2,d.hp2,d.maxHp); if(d.status==='fighting' && !d.winner){arena.classList.add('dueling','screenShake'); $('status').innerHTML='DUEL IN PROGRESS<br><span style="font-size:.7em;color:#d8b4fe">SWORDS CLASHING</span>'; updateTimer(d); } else {arena.classList.add('finished'); $('timer').textContent='00:00'; $('status').innerHTML='<span class="winner">🏆 '+esc(d.winner||'Winner')+' wins!</span>'; if(d.winnerSide===1){$('fighter1').classList.add('winnerKnight');$('fighter2').classList.add('loser')}else{$('fighter2').classList.add('winnerKnight');$('fighter1').classList.add('loser')}}}
function setHp(side,h,max){const p=pct(h,max); $('hp'+side).style.width=p+'%'; $('hp'+side+'num').textContent=Math.max(0,Math.round(h||0))+' / '+(max||100)}
function updateTimer(d){const end=Number(d.endsAt)||localEnd; const left=Math.max(0,end-Date.now()); $('timer').textContent='00:'+String(Math.ceil(left/1000)).padStart(2,'0')}
try{const socket=io({transports:['websocket','polling']});socket.on('state',render)}catch(e){}
async function fetchState(){try{const r=await fetch('/api/state?ts='+Date.now(),{cache:'no-store'});render(await r.json())}catch(e){}}
setInterval(()=>{ if(state?.currentDuel?.status==='fighting') updateTimer(state.currentDuel) },200);
setInterval(fetchState,1000); fetchState();
</script>
</body>
</html>
