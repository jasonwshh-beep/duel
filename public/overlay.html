<!doctype html>
<html>
<head>
<meta charset="utf-8">
<script src="/socket.io/socket.io.js"></script>
<style>
:root{--purple:#a855f7;--purple2:#5b21b6;--dark:#090018;--panel:rgba(8,3,18,.78);--red:#ef4444;--gold:#facc15;--white:#fff}
*{box-sizing:border-box}html,body{width:100%;height:100%;margin:0;overflow:hidden;font-family:Arial,Helvetica,sans-serif;color:#fff;background:radial-gradient(circle at 50% 35%,#5b21b6 0%,#2e1065 46%,#070011 100%)}
.arena{position:relative;width:100vw;height:100vh;min-width:900px;min-height:520px;border:8px solid rgba(168,85,247,.4);box-shadow:inset 0 0 90px rgba(0,0,0,.9),inset 0 0 80px rgba(168,85,247,.35);background:linear-gradient(180deg,rgba(20,0,45,.1),rgba(0,0,0,.58)),radial-gradient(circle at 50% 52%,rgba(168,85,247,.36),transparent 38%)}
.castle{position:absolute;inset:0;opacity:.22;background:linear-gradient(transparent 55%,rgba(0,0,0,.82) 55%),repeating-linear-gradient(90deg,transparent 0 74px,rgba(255,255,255,.08) 75px 80px,transparent 81px 155px);clip-path:polygon(0 36%,7% 36%,7% 26%,12% 26%,12% 36%,20% 36%,20% 18%,27% 18%,27% 36%,37% 36%,37% 25%,44% 25%,44% 36%,56% 36%,56% 25%,63% 25%,63% 36%,73% 36%,73% 18%,80% 18%,80% 36%,88% 36%,88% 26%,93% 26%,93% 36%,100% 36%,100% 100%,0 100%)}
.header{position:absolute;top:12px;left:24px;right:24px;height:132px;z-index:10;display:grid;grid-template-columns:1fr 230px 1fr;align-items:start;gap:18px;pointer-events:none}.titleWrap{text-align:center;grid-column:1/4}.title{font-size:clamp(30px,4vw,60px);line-height:1;font-weight:1000;letter-spacing:2px;text-shadow:0 0 18px var(--purple),0 5px 0 #000}.subtitle{font-size:clamp(16px,1.5vw,24px);font-weight:900;margin-top:6px}.subtitle b{color:#d8b4fe}.timer{grid-column:2;justify-self:center;margin-top:2px;width:220px;padding:8px 18px;text-align:center;border:2px solid rgba(216,180,254,.75);border-radius:18px;background:rgba(0,0,0,.62);font-size:clamp(28px,3vw,42px);font-weight:1000;color:#d8b4fe;box-shadow:0 0 25px rgba(168,85,247,.35)}
.battlefield{position:absolute;left:34px;right:34px;top:155px;bottom:130px;display:grid;grid-template-columns:minmax(310px,1fr) 230px minmax(310px,1fr);align-items:stretch;gap:18px;z-index:4}.side{position:relative;min-width:0}.leftSide{grid-column:1}.rightSide{grid-column:3}.nameplate{position:absolute;top:0;width:86%;min-height:58px;padding:10px 18px;background:var(--panel);border:2px solid rgba(216,180,254,.78);border-radius:18px;font-size:clamp(22px,2.1vw,34px);font-weight:1000;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;box-shadow:0 0 22px rgba(0,0,0,.55);z-index:9}.leftSide .nameplate{left:0;color:#e9d5ff}.rightSide .nameplate{right:0;color:#fecaca;border-color:rgba(252,165,165,.75)}
.fighter{position:absolute;top:68px;bottom:92px;width:min(300px,50%);min-width:225px;max-height:365px;left:50%;transform:translateX(-50%);filter:drop-shadow(0 20px 25px rgba(0,0,0,.85));z-index:5}.leftSide .fighter{left:67%;animation:leftIdle 1.1s infinite ease-in-out}.rightSide .fighter{left:33%;transform:translateX(-50%) scaleX(-1);animation:rightIdle 1.1s infinite ease-in-out}.dueling .leftSide .fighter{animation:leftCombatBody .62s infinite ease-in-out}.dueling .rightSide .fighter{animation:rightCombatBody .62s infinite ease-in-out}.dueling .arm.front{animation:weaponArmSwing .62s infinite ease-in-out}.dueling .sword{animation:weaponBladeSwing .62s infinite ease-in-out}.dueling .fighter{filter:drop-shadow(0 20px 25px rgba(0,0,0,.85)) drop-shadow(0 0 18px rgba(168,85,247,.55))}.finished .loser{opacity:.55;filter:grayscale(.6) drop-shadow(0 10px 18px #000)}
.head{position:absolute;left:34%;top:3%;width:32%;height:20%;background:linear-gradient(145deg,#f8fafc,#64748b 60%,#111827);border:4px solid #111;border-radius:48% 48% 36% 36%;box-shadow:inset -10px -10px 15px rgba(0,0,0,.45)}.plume{position:absolute;left:42%;top:-5%;width:28%;height:12%;background:linear-gradient(90deg,#d8b4fe,#7c3aed);border-radius:100% 0 100% 0;transform:rotate(-15deg)}.rightSide .plume{background:linear-gradient(90deg,#fca5a5,#dc2626)}.visor{position:absolute;left:42%;top:12%;width:20%;height:3.4%;background:#050505;border-radius:10px;box-shadow:0 0 8px #000}.body{position:absolute;left:27%;top:23%;width:48%;height:39%;background:linear-gradient(135deg,#e5e7eb,#374151 55%,#0f172a);border:4px solid #111;border-radius:30px 30px 22px 22px;box-shadow:inset -18px -18px 24px rgba(0,0,0,.55)}.crest{position:absolute;left:41%;top:33%;font-size:clamp(30px,3.3vw,46px);color:#d8b4fe;text-shadow:0 2px 5px #000}.rightSide .crest{color:#f87171}.cape{position:absolute;left:5%;top:23%;width:44%;height:62%;background:linear-gradient(140deg,#7c3aed,#2e1065);clip-path:polygon(45% 0,100% 15%,75% 100%,0 85%);opacity:.9;z-index:-1}.rightSide .cape{background:linear-gradient(140deg,#dc2626,#450a0a)}.arm{position:absolute;width:14%;height:31%;background:linear-gradient(#cbd5e1,#334155);border:3px solid #111;border-radius:20px;top:32%}.arm.front{left:67%;top:31%;height:34%;transform:rotate(-52deg);transform-origin:top center;z-index:7}.arm.back{left:20%;transform:rotate(35deg);transform-origin:top}.leg{position:absolute;width:16%;height:30%;background:linear-gradient(#94a3b8,#1e293b);border:3px solid #111;border-radius:18px;top:60%}.leg.one{left:31%;transform:rotate(8deg)}.leg.two{left:55%;transform:rotate(-8deg)}.sword{position:absolute;left:79%;top:13%;width:6%;height:84%;background:linear-gradient(90deg,#94a3b8,#fff,#64748b);border:2px solid #111;transform:rotate(-58deg);transform-origin:50% 90%;border-radius:10px;box-shadow:0 0 18px rgba(255,255,255,.75);z-index:8}.sword:before{content:"";position:absolute;left:-160%;bottom:7%;width:410%;height:5%;background:#8b5cf6;border:2px solid #111;border-radius:8px}.rightSide .sword:before{background:#ef4444}.shield{position:absolute;left:7%;top:40%;width:24%;height:22%;background:linear-gradient(135deg,#a855f7,#2e1065);border:4px solid #111;border-radius:50% 50% 45% 45%;box-shadow:inset -10px -10px 14px rgba(0,0,0,.4)}.rightSide .shield{background:linear-gradient(135deg,#ef4444,#450a0a)}
.clashSwords{display:none}.impactFlash{display:none}.shockRing{display:none}.clashBlade{display:none}
.hitBurst{position:absolute;left:50%;top:47%;width:120px;height:120px;transform:translate(-50%,-50%);opacity:0;z-index:13;pointer-events:none;background:radial-gradient(circle,#fff 0 5%,#fde047 6% 16%,rgba(249,115,22,.9) 17% 25%,transparent 56%);clip-path:polygon(50% 0,58% 38%,100% 20%,65% 50%,100% 80%,58% 62%,50% 100%,42% 62%,0 80%,35% 50%,0 20%,42% 38%)}.dueling .hitBurst{animation:impactFlash .62s infinite}
.hpwrap{position:absolute;left:0;right:0;bottom:0;background:rgba(0,0,0,.72);border:2px solid rgba(255,255,255,.22);border-radius:18px;padding:12px 16px;z-index:12}.hptext{display:flex;justify-content:space-between;font-size:clamp(18px,1.6vw,24px);font-weight:1000;margin-bottom:8px}.bar{height:clamp(24px,2.4vw,34px);background:#180a29;border-radius:999px;overflow:hidden;border:2px solid rgba(255,255,255,.25)}.fill{height:100%;width:100%;transition:width .45s linear;border-radius:999px}.leftFill{background:linear-gradient(90deg,#581c87,#a855f7,#e9d5ff);box-shadow:0 0 18px #a855f7}.rightFill{background:linear-gradient(90deg,#7f1d1d,#ef4444,#fecaca);box-shadow:0 0 18px #ef4444}
.centerLane{grid-column:2;position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;z-index:8}.vs{font-size:clamp(55px,6vw,95px);font-weight:1000;color:#e9d5ff;text-shadow:0 0 25px #a855f7}.status{width:100%;min-height:100px;display:flex;align-items:center;justify-content:center;text-align:center;padding:14px 18px;background:rgba(0,0,0,.72);border:2px solid rgba(168,85,247,.78);border-radius:22px;font-size:clamp(18px,1.8vw,28px);line-height:1.1;font-weight:1000;box-shadow:0 0 24px rgba(0,0,0,.65);overflow:hidden}.winner{color:var(--gold);text-shadow:0 0 18px #000,0 0 16px #f59e0b}.spark{position:absolute;left:50%;top:46%;width:80px;height:80px;transform:translate(-50%,-50%);background:radial-gradient(circle,#fff 0 8%,#facc15 9% 18%,transparent 45%);opacity:0;z-index:7}.dueling .spark{animation:spark 1s infinite}
.footer{position:absolute;left:34px;right:34px;bottom:24px;height:84px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:18px;z-index:10}.pool,.info{display:flex;align-items:center;justify-content:center;text-align:center;padding:12px 20px;background:rgba(0,0,0,.65);border:2px solid rgba(216,180,254,.62);border-radius:20px;font-size:clamp(18px,1.7vw,28px);font-weight:1000;box-shadow:0 0 18px rgba(0,0,0,.5)}.pool b{color:#d8b4fe;font-size:1.25em;margin-right:8px}.info b{color:#d8b4fe}.hidden{display:none}
@keyframes leftIdle{50%{transform:translateX(-50%) translateY(-5px)}}@keyframes rightIdle{50%{transform:translateX(-50%) scaleX(-1) translateY(-5px)}}@keyframes leftCombatBody{0%,100%{transform:translateX(-50%) translateY(0) rotate(0deg)}25%{transform:translateX(-46%) translateY(-4px) rotate(-2deg)}48%{transform:translateX(-35%) translateY(2px) rotate(3deg)}62%{transform:translateX(-38%) translateY(0) rotate(1deg)}80%{transform:translateX(-45%) translateY(-2px) rotate(-1deg)}}@keyframes rightCombatBody{0%,100%{transform:translateX(-50%) scaleX(-1) translateY(0) rotate(0deg)}25%{transform:translateX(-54%) scaleX(-1) translateY(-4px) rotate(-2deg)}48%{transform:translateX(-65%) scaleX(-1) translateY(2px) rotate(3deg)}62%{transform:translateX(-62%) scaleX(-1) translateY(0) rotate(1deg)}80%{transform:translateX(-55%) scaleX(-1) translateY(-2px) rotate(-1deg)}}@keyframes weaponArmSwing{0%,100%{transform:rotate(-54deg)}26%{transform:rotate(-82deg)}48%{transform:rotate(-28deg)}62%{transform:rotate(-38deg)}80%{transform:rotate(-70deg)}}@keyframes weaponBladeSwing{0%,100%{transform:rotate(-62deg)}26%{transform:rotate(-92deg)}48%{transform:rotate(-25deg)}62%{transform:rotate(-34deg)}80%{transform:rotate(-78deg)}}@keyframes impactFlash{0%,40%,100%{opacity:0;transform:translate(-50%,-50%) scale(.35) rotate(0deg)}48%,60%{opacity:1;transform:translate(-50%,-50%) scale(1.05) rotate(18deg)}75%{opacity:.45;transform:translate(-50%,-50%) scale(.75) rotate(35deg)}}@keyframes spark{0%,55%,100%{opacity:0;transform:translate(-50%,-50%) scale(.4)}45%{opacity:1;transform:translate(-50%,-50%) scale(1.25)}}
@media(max-width:1000px){.arena{min-width:0}.battlefield{left:16px;right:16px;grid-template-columns:1fr 160px 1fr}.footer{left:16px;right:16px}.fighter{min-width:170px}.nameplate{width:95%;font-size:20px}.status{font-size:18px}.title{font-size:34px}.timer{width:160px;font-size:30px}}
</style>
</head>
<body>
<div id="arena" class="arena">
  <div class="castle"></div>
  <div class="header">
    <div class="titleWrap"><div class="title">⚔️ DUEL GIVEAWAY ⚔️</div><div class="subtitle">TYPE <b id="cmd">!DUEL</b> TO ENTER</div></div>
    <div id="timer" class="timer">00:15</div>
  </div>
  <div class="battlefield">
    <div class="side leftSide">
      <div id="name1" class="nameplate">PLAYER 1</div>
      <div id="fighter1" class="fighter"><div class="cape"></div><div class="plume"></div><div class="head"></div><div class="visor"></div><div class="body"></div><div class="crest">♛</div><div class="arm back"></div><div class="arm front"></div><div class="sword"></div><div class="shield"></div><div class="leg one"></div><div class="leg two"></div></div>
      <div class="hpwrap"><div class="hptext"><span>HP</span><span id="hp1num">100 / 100</span></div><div class="bar"><div id="hp1" class="fill leftFill"></div></div></div>
    </div>
    <div class="centerLane"><div class="vs">VS</div><div id="status" class="status">Waiting for duel...</div></div>
    <div class="side rightSide">
      <div id="name2" class="nameplate">PLAYER 2</div>
      <div id="fighter2" class="fighter"><div class="cape"></div><div class="plume"></div><div class="head"></div><div class="visor"></div><div class="body"></div><div class="crest">♛</div><div class="arm back"></div><div class="arm front"></div><div class="sword"></div><div class="shield"></div><div class="leg one"></div><div class="leg two"></div></div>
      <div class="hpwrap"><div class="hptext"><span>HP</span><span id="hp2num">100 / 100</span></div><div class="bar"><div id="hp2" class="fill rightFill"></div></div></div>
    </div>
  </div>
  <div class="spark"></div><div class="hitBurst"></div>
  <div class="footer"><div id="pool" class="pool"><b>0</b> entered</div><div class="info">2 RANDOM PEOPLE DUEL</div><div class="info">WINNER GETS <b>&nbsp;THE TIP</b></div></div>
</div>
<script>
const arena=document.getElementById('arena'),cmd=document.getElementById('cmd'),name1=document.getElementById('name1'),name2=document.getElementById('name2'),hp1=document.getElementById('hp1'),hp2=document.getElementById('hp2'),hp1num=document.getElementById('hp1num'),hp2num=document.getElementById('hp2num'),timer=document.getElementById('timer'),statusEl=document.getElementById('status'),pool=document.getElementById('pool'),fighter1=document.getElementById('fighter1'),fighter2=document.getElementById('fighter2');
let lastState=null;
function esc(x){return String(x||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
function pct(v,max){return Math.max(0,Math.min(100,Math.round((Number(v)||0)/(Number(max)||100)*100)))}
function mmss(ms){const s=Math.max(0,Math.ceil(ms/1000));return `00:${String(s).padStart(2,'0')}`}
function render(s){lastState=s;cmd.textContent=(s.command||'!duel').toUpperCase();pool.innerHTML=`<b>${s.poolCount||0}</b> entered`;const d=s.currentDuel;if(!d){arena.classList.remove('dueling','finished');name1.textContent='PLAYER 1';name2.textContent='PLAYER 2';hp1.style.width='100%';hp2.style.width='100%';hp1num.textContent='100 / 100';hp2num.textContent='100 / 100';timer.textContent='00:15';statusEl.textContent='Waiting for roll...';statusEl.classList.remove('winner');fighter1.classList.remove('loser');fighter2.classList.remove('loser');return;}name1.innerHTML='@'+esc(d.fighter1);name2.innerHTML='@'+esc(d.fighter2);const max=d.maxHp||100;hp1.style.width=pct(d.hp1,max)+'%';hp2.style.width=pct(d.hp2,max)+'%';hp1num.textContent=`${d.hp1} / ${max}`;hp2num.textContent=`${d.hp2} / ${max}`;if(d.status==='fighting'){arena.classList.add('dueling');arena.classList.remove('finished');statusEl.textContent=(d.log&&d.log[0])?d.log[0]:'Swords are clashing...';statusEl.classList.remove('winner');fighter1.classList.remove('loser');fighter2.classList.remove('loser');}else{arena.classList.remove('dueling');arena.classList.add('finished');statusEl.innerHTML=`🏆 ${esc(d.winner)} WINS`;statusEl.classList.add('winner');if(d.loser===d.fighter1)fighter1.classList.add('loser');if(d.loser===d.fighter2)fighter2.classList.add('loser');timer.textContent='00:00';}}
function tickTimer(){const d=lastState?.currentDuel;if(!d||d.status!=='fighting')return;timer.textContent=mmss((d.endsAt||Date.now())-Date.now())}
async function poll(){try{render(await fetch('/api/state?ts='+Date.now(),{cache:'no-store'}).then(r=>r.json()))}catch(e){}}
try{const socket=io({transports:['websocket','polling'],reconnection:true});socket.on('state',render);socket.on('connect',poll)}catch(e){}
setInterval(poll,1000);setInterval(tickTimer,150);poll();
</script>
</body>
</html>
